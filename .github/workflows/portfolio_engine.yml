name: Run B3 Full Portfolio Pipeline

on:
  workflow_dispatch:

  schedule:
    - cron: "0 10 * * 1"

jobs:
  run-full-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore CVM Cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: cvm-dfp-cache-2025
          restore-keys: |
            cvm-dfp-cache-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fundamental Engine
        timeout-minutes: 5
        run: |
          python main.py

      - name: Run Technical Engine
        timeout-minutes: 5
        run: |
          python -c "from engine.technical_engine import analisar_top20; analisar_top20()"

      - name: Run Portfolio Engine
        timeout-minutes: 2
        run: |
          python -c "from engine.portfolio_engine import montar_carteira; montar_carteira()"

      - name: Run Diversification Engine
        timeout-minutes: 2
        run: |
          python -c "from engine.diversification import analisar_diversificacao; analisar_diversificacao()"

      - name: Run Historical Stress Engine
        timeout-minutes: 10
        run: |
          python -c "from engine.historical_stress import gerar_historical_stress; gerar_historical_stress()"

      - name: Run Stress Test
        timeout-minutes: 3
        run: |
          python -c "from engine.stress_test import executar_stress_test; executar_stress_test()"

      - name: Run AI Audit
        timeout-minutes: 3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -c "from engine.ai_audit import gerar_auditoria_ia; gerar_auditoria_ia()"

      - name: Generate Institutional PDF
        timeout-minutes: 2
        run: |
          python -c "from engine.pdf_report import gerar_pdf_institucional; gerar_pdf_institucional()"

      - name: Send Email Report
        if: success()
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python send_email.py

      - name: Verificar arquivos gerados
        if: always()
        run: |
          echo "Arquivos em output:"
          ls -la output || true

      - name: Upload Full Portfolio Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b3-full-portfolio-report
          path: output/**
          if-no-files-found: warn
          retention-days: 30
